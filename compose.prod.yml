# Use postgres/example user/password credentials

services:

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    volumes:
      - db-data:/dev/shm
    environment:
      POSTGRES_PASSWORD: postgres
    networks:
      - back

  adminer:
    image: adminer
    restart: always
    networks:
      - back
    ports:
      - 8080:8080

  api:
    image: ghcr.io/emeric-sauthier/tp-devops-server:main
    networks:
      - back
    ports:
      - 3000:3000
    volumes:
      - ./server/src/:/app/src

networks:
  back:
    name: back

volumes:
  db-data: